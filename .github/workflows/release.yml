name: Release

# Khi push 1 tag dạng v* (vd v1.0.0): build exe trên Windows và tạo GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # cần để tạo release và upload file

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install plyer pyinstaller pytest

      - name: Run tests
        run: python -m pytest -v

      - name: Build exe with PyInstaller
        run: pyinstaller UniversalVideoDownloader.spec

      - name: Create GitHub Release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/UniversalVideoDownloader.exe
